name: auto build engine

on: 
  release:
    types: [published]
  schedule:
    - cron: "0 16 * * *"
  push:
    branches: 
      - master
  watch:
    types: [started]
   
jobs:
  TENSORRT:
    runs-on: windows-2025
    
    steps:
    - name: Setup cmake
      uses: jwlawson/actions-setup-cmake@master

    - name: Checkout
      uses: actions/checkout@main

    - name: Install Cuda Toolkit
      shell: pwsh
      run: |
        mkdir -p "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v13.0"
        choco install unzip -y
        curl -O "https://developer.download.nvidia.com/compute/cuda/redist/cuda_crt/windows-x86_64/cuda_crt-windows-x86_64-13.0.88-archive.zip"
        curl -O "https://developer.download.nvidia.com/compute/cuda/redist/cuda_cudart/windows-x86_64/cuda_cudart-windows-x86_64-13.0.88-archive.zip"
        curl -O "https://developer.download.nvidia.com/compute/cuda/redist/cuda_nvcc/windows-x86_64/cuda_nvcc-windows-x86_64-13.0.88-archive.zip"
        #curl -O "https://developer.nvidia.com/downloads/compute/machine-learning/tensorrt/10.13.2/zip/TensorRT-10.13.2.6.Windows.win10.cuda-12.9.zip"
        unzip '*.zip' -d "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v13.0"
        xcopy "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v13.0\cuda_crt-windows-x86_64-13.0.88-archive\*" "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v13.0" /E /I /H /Y
        xcopy "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v13.0\cuda_cudart-windows-x86_64-13.0.88-archive\*" "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v13.0" /E /I /H /Y
        xcopy "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v13.0\cuda_nvcc-windows-x86_64-13.0.88-archive\*" "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v13.0" /E /I /H /Y
        #xcopy "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v13.0\TensorRT-10.13.2.6\*" "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v13.0" /E /I /H /Y
        echo "CUDA_PATH=C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v13.0" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
    
    - name: vcpkg build
      uses: johnwason/vcpkg-action@master
      with:
        pkgs: zlib
        triplet: x64-windows
        token: ${{ github.token }}

    - name: Build KataGo
      shell: cmd
      run: |
        set "VCPKG_FILE=%cd%\vcpkg\scripts\buildsystems\vcpkg.cmake"
        set "TENSORRT_INCLUDE_DIR=%cd%\CUDA\include"
        set "TENSORRT_LIBRARY=%cd%\CUDA\lib\nvinfer_10.lib"
        git clone https://github.com/lightvector/KataGo --depth 1
        pushd KataGo\cpp\
        sed -i 's/80 86 87/80 86 89/g' CMakeLists.txt
        call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
        cmake -S . -B build -G "Visual Studio 17 2022" ^
          -DCMAKE_TOOLCHAIN_FILE=%VCPKG_FILE% ^
          -DUSE_AVX2:BOOL=ON ^
          -DNO_GIT_REVISION:BOOL=ON ^
          -DUSE_BACKEND:STRING=TENSORRT ^
          -DTENSORRT_INCLUDE_DIR:PATH=%TENSORRT_INCLUDE_DIR% ^
          -DTENSORRT_LIBRARY:FILEPATH=%TENSORRT_LIBRARY%
        cmake --build build --config Release
        popd
    
    - name: Upload KataGo
      uses: actions/upload-artifact@main
      with:
        name: katago
        path: KataGo\cpp\build\Release\katago.exe
    
  OPENCL:
    runs-on: windows-2025
    
    steps:    
    - name: Setup cmake
      uses: jwlawson/actions-setup-cmake@master
    
    - name: Install Cuda Toolkit
      shell: pwsh
      run: |
        mkdir -p "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v13.0"
        choco install unzip -y
        curl -O "https://developer.download.nvidia.com/compute/cuda/redist/cuda_opencl/windows-x86_64/cuda_opencl-windows-x86_64-13.0.85-archive.zip"
        unzip '*.zip' -d "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v13.0"
        xcopy "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v13.0\cuda_opencl-windows-x86_64-13.0.85-archive\*" "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v13.0" /E /I /H /Y
        echo "CUDA_PATH=C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v13.0" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
    
    - name: vcpkg build
      uses: johnwason/vcpkg-action@master
      with:
        pkgs: zlib
        triplet: x64-windows
        token: ${{ github.token }}

    - name: Build KataGo
      shell: cmd
      run: |
        set "VCPKG_FILE=%cd%\vcpkg\scripts\buildsystems\vcpkg.cmake"
        git clone https://github.com/lightvector/KataGo KataGo_opencl --depth 1
        pushd KataGo_opencl\cpp\
        call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
        cmake -S . -B build -G "Visual Studio 17 2022" ^
          -DCMAKE_TOOLCHAIN_FILE=%VCPKG_FILE% ^
          -DUSE_AVX2:BOOL=ON ^
          -DNO_GIT_REVISION:BOOL=ON ^
          -DUSE_BACKEND:STRING=OPENCL
        cmake --build build --config Release
        mv build\Release\katago.exe build\Release\katago_opencl.exe
        popd
    
    - name: Upload KataGo
      uses: actions/upload-artifact@main
      with:
        name: katago_opencl
        path: KataGo_opencl\cpp\build\Release\katago_opencl.exe

  push:
    needs: [TENSORRT, OPENCL]
    runs-on: windows-2025
    
    steps:
    - name: Checkout
      uses: actions/checkout@main
    
    - name: Clean
      run: |
        rm katago*
    
    - name: Download KataGo TENSORRT
      uses: actions/download-artifact@main
      with:
        name: katago
        path: ./
        
    - name: Download KataGo OPENCL
      uses: actions/download-artifact@main
      with:
        name: katago_opencl
        path: ./
    
    - name: Commit
      run: |
        git config --global user.email "actions@github.com"
        git config --global user.name "GitHub Actions"
        git checkout --orphan new_branch
        git add -A
        git commit -am "update new file"
        git branch -D master
        git branch -m master
        git push origin master --force
